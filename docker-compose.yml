services:
  cpp-server:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./data:/app/data
    stdin_open: true
    tty: true

  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  node-api:
    build:
      context: .
      dockerfile: Dockerfile.node
    ports:
      - "3003:3003"
    environment:
      - CPP_SERVER_PORT=12345
      - MONGO_URI=mongodb://mongo:27017/gomail
    volumes:
      - ./backend/uploads:/app/uploads   
    stdin_open: true
    tty: true
    depends_on:
      - cpp-server
      - mongo

  react-web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - node-api

volumes:
  mongo-data:
